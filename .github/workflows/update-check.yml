name: Update Check
on:
  workflow_dispatch:
  schedule:
  # Setiap Senin dan Kamis jam 07:00 WIB (00:00 UTC)
  - cron: '0 0 * * 1,4'

permissions:
  contents: write

jobs:
  # ==================== ZEN BROWSER ====================
  update-zen-browser-bin:
    name: Check zen-browser-bin updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Run update script
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/update-zen-browser-bin.sh
          ./scripts/update-zen-browser-bin.sh

      - name: Pull latest changes
        if: env.NEW_VERSION != ''
        run: |
          git stash
          git pull --rebase origin main
          git stash pop

      - name: Commit and push
        if: env.NEW_VERSION != ''
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update zen-browser-bin to ${{ env.NEW_VERSION }}"
          add: 'srcpkgs/zen-browser-bin/template'
          github_token: ${{ secrets.PAT_TOKEN }}

  # ==================== GOOGLE CHROME ====================
  update-google-chrome-bin:
    name: Check google-chrome-bin updates
    needs: update-zen-browser-bin
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Run update script
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/update-google-chrome-bin.sh
          ./scripts/update-google-chrome-bin.sh

      - name: Pull latest changes
        if: env.NEW_VERSION != ''
        run: |
          git stash
          git pull --rebase origin main
          git stash pop

      - name: Commit and push
        if: env.NEW_VERSION != ''
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update google-chrome-bin to ${{ env.NEW_VERSION }}"
          add: 'srcpkgs/google-chrome-bin/template'
          github_token: ${{ secrets.PAT_TOKEN }}

  # ==================== HELIUM BROWSER ====================
  update-helium-browser-bin:
    name: Check helium-browser-bin updates
    needs: update-google-chrome-bin
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Run update script
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/update-helium-browser-bin.sh
          ./scripts/update-helium-browser-bin.sh

      - name: Pull latest changes
        if: env.NEW_VERSION != ''
        run: |
          git stash
          git pull --rebase origin main
          git stash pop

      - name: Commit and push
        if: env.NEW_VERSION != ''
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update helium-browser-bin to ${{ env.NEW_VERSION }}"
          add: 'srcpkgs/helium-browser-bin/template'
          github_token: ${{ secrets.PAT_TOKEN }}

  # ==================== MAYULITE NERD FONT ====================
  update-mayulite-nerd-font:
    name: Check mayulite-nerd-font updates
    needs: update-helium-browser-bin
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Run update script
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/update-mayulite-nerd-font.sh
          ./scripts/update-mayulite-nerd-font.sh

      - name: Pull latest changes
        if: env.NEW_VERSION != ''
        run: |
          git stash
          git pull --rebase origin main
          git stash pop

      - name: Commit and push
        if: env.NEW_VERSION != ''
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update mayulite-nerd-font to ${{ env.NEW_VERSION }}"
          add: 'srcpkgs/mayulite-nerd-font/template'
          github_token: ${{ secrets.PAT_TOKEN }}

  # ==================== BRAVE ORIGIN BETA ====================
  update-brave-origin-beta:
    name: Check brave-origin-beta updates
    needs: update-mayulite-nerd-font
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Run update script
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/update-brave-origin-beta.sh
          ./scripts/update-brave-origin-beta.sh

      - name: Pull latest changes
        if: env.NEW_VERSION != ''
        run: |
          git stash
          git pull --rebase origin main
          git stash pop

      - name: Commit and push
        if: env.NEW_VERSION != ''
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update brave-origin-beta to ${{ env.NEW_VERSION }}"
          add: 'srcpkgs/brave-origin-beta/template'
          github_token: ${{ secrets.PAT_TOKEN }}

  # ==================== IOSEVKA NF ====================
  update-iosevka-nf:
    name: Check iosevka-nf updates
    needs: update-brave-origin-beta
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Run update script
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/update-iosevka-nf.sh
          ./scripts/update-iosevka-nf.sh

      - name: Pull latest changes
        if: env.NEW_VERSION != ''
        run: |
          git stash
          git pull --rebase origin main
          git stash pop

      - name: Commit and push
        if: env.NEW_VERSION != ''
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update iosevka-nf to ${{ env.NEW_VERSION }}"
          add: 'srcpkgs/iosevka-nf/template'
          github_token: ${{ secrets.PAT_TOKEN }}

